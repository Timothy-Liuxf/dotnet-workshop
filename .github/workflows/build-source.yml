name: build-source

on:
  pull_request:
    branches: [dev, main]
    paths:
      - "src/**"
  push:
    branches: [dev, main]
    paths:
      - "src/**"

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Build solution
        working-directory: ./src
        run: dotnet build -c Release
